# docker-compose cho trung tam EAUT - Postgres + pgAdmin
# chay: docker compose up -d
# dung: docker compose down

services:
  postgres:
    image: postgres:16-alpine
    container_name: eaut_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eaut_db
      POSTGRES_USER: eaut_admin
      POSTGRES_PASSWORD: eaut_password
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    networks:
      - eaut_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eaut_admin -d eaut_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Note: REST API server (FastAPI/uvicorn) khong chay trong Docker
  # ma duoc spawn boi run.py dang Python subprocess - de bundle vao run.exe
  # va tranh Docker volume mount issues tren Windows.

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: eaut_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eaut.edu.vn
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eaut_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  eaut_network:
    driver: bridge
